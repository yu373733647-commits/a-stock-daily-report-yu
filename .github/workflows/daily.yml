name: 每日生成A股早间内参

on:
  schedule:
    # UTC 0:05 = 北京时间 8:05，周一至周日每天运行
    # 错开整点，降低 GitHub 服务器高峰导致的延迟
    - cron: '5 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行生成脚本
        run: python generate_report.py

      - name: 提交并推送更新
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add -A
          if git diff --cached --quiet; then
            echo "当日内容无变更，跳过提交"
          else
            git commit -m "自动更新：$(date +%Y-%m-%d) 早间内参"
            git push
          fi
