name: 每日生成A股早间内参

on:
  schedule:
    # 北京时间 8:00 = UTC 0:00，周一到周五
    - cron: '0 0 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 运行生成脚本
        run: python generate_report.py

      - name: 提交并推送更新
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add -A
          # 容错写法：有变更才提交，无变更也正常退出不报错
          if git diff --cached --quiet; then
            echo "没有内容变更，跳过提交"
          else
            git commit -m "自动更新：$(date +%Y-%m-%d) 早间内参"
            git push
          fi
